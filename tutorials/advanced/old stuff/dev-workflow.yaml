name: Full Stack Development

jobs:
  dev:
    name: Start Dev Environment
    outputs:
      db_url: "postgres://postgres:secret@localhost:5432/app"
      redis_url: "redis://localhost:6379"
    sequence:
      # Start services in parallel
      - name: Start Services
        parallel:
          - name: PostgreSQL
            id: postgres
            image: postgres:16-alpine
            background: true
            expose: 5432
            healthCheck:
              cmd: pg_isready -U postgres
            env:
              POSTGRES_PASSWORD: secret
              POSTGRES_DB: app

          - name: Redis
            id: redis
            image: redis:7-alpine
            background: true
            expose: 6379
            healthCheck:
              cmd: redis-cli ping

      - name: Ready
        image: alpine:latest
        cmd: |
          echo "Services are ready!"
          echo ""
          echo "PostgreSQL: localhost:5432 (or postgres:5432 from containers)"
          echo "Redis: localhost:6379 (or redis:6379 from containers)"
          echo ""
          echo "Press Ctrl+C to stop all services..."

  test:
    name: Run Tests
    switch: "{{ env.TEST_TYPE }}"
    case:
      unit:
        - name: Unit Tests
          image: node:20-alpine
          cmd: echo "Running unit tests only..."
      
      integration:
        - name: Integration Tests
          image: node:20-alpine
          cmd: echo "Running integration tests only..."
    
    default:
      - name: All Tests
        parallel:
          - name: Unit Tests
            image: node:20-alpine
            cmd: echo "Running unit tests..."
          
          - name: Integration Tests
            image: node:20-alpine
            cmd: echo "Running integration tests..."

  build:
    name: Build for Production
    outputs:
      image: "{{ steps.build.image }}"
      version: "{{ steps.version.tag }}"
    sequence:
      - name: Get Version
        id: version
        image: alpine:latest
        cmd: |
          TAG="v1.0.$(date +%Y%m%d)"
          echo "tag=$TAG" >> $OUTPUTS
          echo "Building version $TAG"

      - name: Build Image
        id: build
        build:
          image: "myapp:{{ steps.version.tag }}"
          dockerfile: Dockerfile
