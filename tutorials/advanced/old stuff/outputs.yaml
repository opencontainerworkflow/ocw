name: Step Outputs Demo
sequence:
  - name: Generate Version
    id: versioner
    image: alpine:latest
    cmd: |
      VERSION="1.0.$(date +%s)"
      echo "version=$VERSION" >> $OUTPUTS
      echo "Generated version: $VERSION"

  - name: Use Version
    image: alpine:latest
    cmd: |
      echo "Building version {{ steps.versioner.version }}"
