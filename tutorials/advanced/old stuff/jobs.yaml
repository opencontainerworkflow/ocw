name: My Project

jobs:
  build:
    name: Build the App
    sequence:
      - name: Install
        image: node:20-alpine
        cmd: echo "Installing dependencies..."
      
      - name: Build
        image: node:20-alpine
        cmd: echo "Building..."

  test:
    name: Run Tests
    parallel:
      - name: Unit Tests
        image: node:20-alpine
        cmd: echo "Running unit tests..."
      
      - name: Lint
        image: node:20-alpine
        cmd: echo "Running linter..."

  dev:
    name: Development Server
    sequence:
      - name: Start Dev
        image: node:20-alpine
        cmd: echo "Starting dev server on http://localhost:3000..."
