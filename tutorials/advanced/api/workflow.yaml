name: Simple Express API

jobs:
  build:
    name: Build Docker Image
    sequence:
      - name: Build API Server
        id: build
        build:
          image: simple-api:latest
          dockerfile: Dockerfile
          context: ./

  dev:
    name: Start Development Server
    sequence:
      - name: Start API
        image: simple-api:latest
        id: api
        background: true
        expose: 3000
        env:
          PORT: "3000"
        healthCheck:
          cmd: wget -q --spider http://localhost:3000/
          interval: 2s
          retries: 10

      - name: Test Server
        image: curlimages/curl:latest
        cmd: |
          echo "Testing the API server..."
          curl -s http://api:3000/
          echo ""
          echo "Server is running!"
