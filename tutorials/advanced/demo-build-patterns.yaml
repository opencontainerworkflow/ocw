name: Demo - OCW Build Context Patterns
description: Demonstrates different ways to use context and /workflow in OCW builds

sequence:
  - name: Pattern 1 - Subdirectory context with COPY
    build:
      image: demo/pattern1
      dockerfile: Dockerfiles/Dockerfile.website
      context: /workflow/Dockerfiles
    # This uses COPY relative to Dockerfiles/
  
  - name: Pattern 2 - Same with ./ prefix
    build:
      image: demo/pattern2
      dockerfile: ./Dockerfiles/Dockerfile.website
      context: ./Dockerfiles
    # Exactly the same as Pattern 1, just different syntax
  
  - name: Pattern 3 - Same without prefix
    build:
      image: demo/pattern3
      dockerfile: Dockerfiles/Dockerfile.website
      context: Dockerfiles
    # Also exactly the same, most concise syntax
  
  - name: Pattern 4 - Root context with /workflow mount
    build:
      image: demo/pattern4
      dockerfile: Dockerfiles/website-run.Dockerfile
      # context defaults to /workflow (workflow root)
    # This uses RUN to access /workflow/Dockerfiles/
  
  - name: Verify all images built successfully
    image: alpine:latest
    cmd: |
      echo "✓ All build patterns completed successfully!"
      echo ""
      echo "Summary:"
      echo "- Pattern 1-3: Used COPY with Dockerfiles/ as build context"
      echo "- Pattern 4: Used RUN with /workflow mount"
      echo ""
      echo "All paths were resolved relative to /workflow (the workflow root)"
