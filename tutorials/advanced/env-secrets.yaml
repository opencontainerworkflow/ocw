# env-secrets.yaml
name: Environment and Secrets Demo

# Workflow-level env variables
# - Regular strings are normal env vars
# - Objects with 'secret: true' are secrets (can have optional 'default')
env:
  # Regular env vars with defaults
  NODE_ENV: development
  BUILD_TARGET: local
  APP_NAME: default-app
  
  # Secret env vars (marked with 'secret: true')
  DB_PASSWORD:
    secret: true
    default: default-db-password
  
  API_KEY:
    secret: true
  
  API_SECRET:
    secret: true
    default: default-api-secret

sequence:
  - name: Show Environment Variables
    image: alpine:latest
    cmd: |
      echo "Workflow env vars:"
      echo "  NODE_ENV: $NODE_ENV"
      echo "  BUILD_TARGET: $BUILD_TARGET"
      echo "  APP_NAME: {{ env.APP_NAME }}"

  - name: Show Secrets
    image: alpine:latest
    cmd: |
      echo "Secrets from workflow (can be overridden by .env):"
      echo "  DB_PASSWORD: {{ secrets.DB_PASSWORD }}"
      echo "  API_KEY: {{ secrets.API_KEY }}"
      echo "  API_SECRET: {{ secrets.API_SECRET }}"

  - name: Step-Level Override
    image: alpine:latest
    env:
      NODE_ENV: production
      STEP_VAR: I am step-specific
    cmd: |
      echo "Step overrides workflow env:"
      echo "  NODE_ENV: $NODE_ENV (should be 'production')"
      echo "  BUILD_TARGET: $BUILD_TARGET (still from workflow)"
      echo "  STEP_VAR: $STEP_VAR (step-only)"

  - name: Use Secrets in URLs
    image: alpine:latest
    env:
      DATABASE_URL: "postgresql://user:{{ secrets.DB_PASSWORD }}@localhost:5432/mydb"
    cmd: |
      echo "Constructed using secrets:"
      echo "  DATABASE_URL: $DATABASE_URL"
