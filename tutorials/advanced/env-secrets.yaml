# env-secrets.yaml
name: Environment and Secrets Demo

# Workflow-level env variables available to all steps
env:
  NODE_ENV: development
  BUILD_TARGET: local

sequence:
  - name: Show Environment Variables
    image: alpine:latest
    cmd: |
      echo "Workflow env vars:"
      echo "  NODE_ENV: $NODE_ENV"
      echo "  BUILD_TARGET: $BUILD_TARGET"
      echo "  From .env - APP_NAME: {{ env.APP_NAME }}"
      echo "  From .env - APP_VERSION: {{ env.APP_VERSION }}"
      echo "  From .env - LOG_LEVEL: {{ env.LOG_LEVEL }}"

  - name: Show Secrets (sensitive values from .env)
    image: alpine:latest
    cmd: |
      echo "Secrets from .env file:"
      echo "  API_KEY: {{ secrets.API_KEY }}"
      echo "  API_SECRET: {{ secrets.API_SECRET }}"
      echo "  DB_PASSWORD: {{ secrets.DB_PASSWORD }}"

  - name: Step-Level Override
    image: alpine:latest
    # Step-level env variables override workflow-level
    env:
      NODE_ENV: production
      STEP_VAR: I am step-specific
    cmd: |
      echo "Step overrides workflow env:"
      echo "  NODE_ENV: $NODE_ENV (should be 'production')"
      echo "  BUILD_TARGET: $BUILD_TARGET (still from workflow)"
      echo "  STEP_VAR: $STEP_VAR (step-only)"

  - name: Use in Commands and URLs
    image: alpine:latest
    env:
      DATABASE_URL: "postgresql://user:{{ secrets.DB_PASSWORD }}@localhost:5432/mydb"
      API_ENDPOINT: "https://api.{{ env.APP_NAME }}.com/v{{ env.APP_VERSION }}"
    cmd: |
      echo "Constructed values using env/secrets:"
      echo "  DATABASE_URL: $DATABASE_URL"
      echo "  API_ENDPOINT: $API_ENDPOINT"
      echo "  Using secret in header: Authorization: Bearer {{ secrets.API_KEY }}"
