# Example inputs file for OCW workflows
# Use with: ocw -i inputs.yaml <job-name>

# Application configuration
app_name: "MyAwesomeApp"
app_version: "2.0.0"

# Deployment settings
environment: staging
replicas: 3
memory_limit: "512Mi"

# Feature flags
enable_debug: true
enable_metrics: false

# Database configuration
db_host: "localhost"
db_port: 5432
db_name: "myapp_db"
