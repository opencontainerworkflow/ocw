schemaVersion: "0.1.0"
name: Basic CI Pipeline
description: Sequential CI workflow with dependency installation, tests, and linting

sequence:
  - name: Install Dependencies
    image: node:20-alpine
    cmd: npm ci

  - name: Run Tests
    id: tests
    image: node:20-alpine
    cmd: npm test
    env:
      CI: "true"
      NODE_ENV: test

  - name: Lint
    image: node:20-alpine
    cmd: npm run lint
