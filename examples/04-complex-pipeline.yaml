schemaVersion: "0.1.0"
name: Complex Pipeline
description: Multi-stage pipeline with sequential and parallel steps

inputs:
  environment:
    type: choice
    description: Deployment environment
    options:
      - development
      - staging
      - production
    default: development
    required: true

sequence:
  - name: Setup
    image: node:20-alpine
    cmd: npm ci

  - name: Build
    image: node:20-alpine
    cmd: npm run build
    env:
      NODE_ENV: production

  - parallel:
      - name: Test Backend
        image: node:20-alpine
        cmd: npm run test:backend
        memory: "1g"

      - name: Test Frontend
        image: node:20-alpine
        cmd: npm run test:frontend
        memory: "1g"

  - name: Deploy
    image: kubectl:latest
    cmd: kubectl apply -f deployment-{{inputs.environment}}.yaml
    env:
      KUBECONFIG: /workflow/.kube/config
