schemaVersion: "0.1.0"
name: Secrets and Environment Variables
description: Demonstrate using encrypted secrets and environment variables

config:
  secrets:
    provider: awskms://alias/my-ocw-kms-key
    encryptedkey: AQICAHiahJb4rkX2sdnv/0Jp5syXWvmLRhHObVRiTWTgfAcqoAGhMZRpxCo4qTWxGvwWA5hbAAAAfjB8BgkqhkiG9w0BBwagbzBtAgEAMGgGCSqGSIb3DQEHATAeBglghkgBZQMEAS4wEQQM8CtT33PdoOX+YAADAgEQgDuTioSP7BPFaTkd/u6wdt284pQYXVVpkWJa4813eiiWUmxKBildvlA2xlRJcQb9y+qrMdeNy7M25bpX9g==

secrets:
  slackWebhookUrl:
    secure: v1:YijggfkQPZiKwyq8:WxCkaqkNDjqJ2A5t4LRMtlyKdI66HnryrFTpOgroGFyd7eVUiCCeIt8B/Sjbm+cYljDfHQ==
  dbPassword:
    secure: v1:AbCdEfGhIjKlMnOp:QrStUvWxYzAbCdEfGhIjKlMnOpQrStUvWxYzAbCdEfGhIjKlMnOpQrStUvWxYz==

env:
  APP_NAME: my-application
  LOG_LEVEL: info

sequence:
  - name: Database Migration
    image: postgres:15
    cmd: psql -h $DB_HOST -U postgres -d myapp -f /workflow/migrations/001.sql
    env:
      PGPASSWORD: "{{secrets.dbPassword}}"
      DB_HOST: localhost

  - name: Run Application Tests
    image: node:20-alpine
    cmd: npm test
    env:
      NODE_ENV: test
      DATABASE_URL: "postgresql://postgres:{{secrets.dbPassword}}@localhost:5432/myapp"

  - name: Send Slack Notification
    image: curlimages/curl:latest
    cmd: |
      curl -X POST "{{secrets.slackWebhookUrl}}" \
        -H "Content-Type: application/json" \
        -d '{
          "text": "Application deployed successfully!",
          "blocks": [
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Deployment Status:* Success\n*Application:* {{env.APP_NAME}}\n*Environment:* Production"
              }
            }
          ]
        }'
