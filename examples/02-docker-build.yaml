schemaVersion: "0.1.0"
name: Docker Build Workflow
description: Build and push Docker image with multi-platform support

inputs:
  tag:
    type: string
    description: Docker image tag
    default: latest
    required: false

sequence:
  - name: Build Application Image
    description: Build production Docker image for multiple platforms
    build:
      image: myapp:{{inputs.tag}}
      context: /workflow
      dockerfile: Dockerfile
      target: production
      platform:
        - linux/amd64
        - linux/arm64
      buildArgs:
        NODE_ENV: production
        BUILD_DATE: "2024-01-01"
      tags:
        - myapp:{{inputs.tag}}
        - myapp:latest
      cacheFrom:
        - myapp:cache
      cacheTo:
        - type=registry,ref=myapp:cache,mode=max
      push: true
      provenance: mode=max
      sbom: true
