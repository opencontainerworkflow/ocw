schemaVersion: "0.1.0"
name: Parallel Testing
description: Run multiple test suites in parallel for faster CI

env:
  NODE_ENV: test
  CI: "true"

parallel:
  - name: Unit Tests
    image: node:20-alpine
    cmd: npm run test:unit
    memory: "512m"
    cpus: 1

  - name: Integration Tests
    image: node:20-alpine
    cmd: npm run test:integration
    memory: "1g"
    cpus: 2
    env:
      DATABASE_URL: "{{secrets.TEST_DB_URL}}"

  - name: E2E Tests
    image: playwright:latest
    cmd: npm run test:e2e
    memory: "2g"
    cpus: 2
