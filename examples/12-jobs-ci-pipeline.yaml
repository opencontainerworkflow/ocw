schemaVersion: "0.1.0"
name: CI Pipeline with Jobs
description: CI/CD workflow with multiple jobs for different stages

env:
  NODE_ENV: test
  CI: "true"

jobs:
  # Build job
  build:
    name: Build Application
    build:
      image: myapp:test
      context: /workflow
      target: production

  # Unit tests (no external dependencies)
  test_unit:
    name: Unit Tests
    sequence:
      - name: Install Dependencies
        image: node:20-alpine
        cmd: npm ci

      - name: Run Unit Tests
        image: node:20-alpine
        cmd: npm run test:unit

  # Integration tests (needs database)
  test_integration:
    name: Integration Tests
    sequence:
      - name: Install Dependencies
        image: node:20-alpine
        cmd: npm ci

      - name: Start Test Database
        parallel:
          - name: PostgreSQL
            image: postgres:15-alpine
            env:
              POSTGRES_USER: test
              POSTGRES_PASSWORD: testpass
              POSTGRES_DB: testdb

          - name: Redis
            image: redis:7-alpine

      - name: Run Migrations
        image: node:20-alpine
        cmd: npm run migrate
        env:
          DATABASE_URL: postgres://test:testpass@localhost:5432/testdb

      - name: Run Integration Tests
        image: node:20-alpine
        cmd: npm run test:integration
        env:
          DATABASE_URL: postgres://test:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379

  # E2E tests
  test_e2e:
    name: E2E Tests
    sequence:
      - name: Build Application
        build:
          image: myapp:test
          context: /workflow
          target: production

      - name: Install Dependencies
        image: node:20-alpine
        cmd: npm ci

      - name: Run E2E Tests
        image: mcr.microsoft.com/playwright:latest
        cmd: npm run test:e2e
        memory: "2g"
        env:
          BASE_URL: http://localhost:3000

  # Full CI pipeline
  ci:
    name: Full CI Pipeline
    description: Run all tests in sequence
    sequence:
      # Lint and type check first
      - parallel:
          - name: Lint
            image: node:20-alpine
            cmd: npm ci && npm run lint

          - name: Type Check
            image: node:20-alpine
            cmd: npm ci && npx tsc --noEmit

      # Build
      - name: Build Application
        build:
          image: myapp:test
          context: /workflow
          target: production

      # Run all tests in parallel
      - parallel:
          - name: Unit Tests
            image: node:20-alpine
            cmd: npm ci && npm run test:unit

          - name: Integration Tests
            image: node:20-alpine
            cmd: npm ci && npm run test:integration
            env:
              DATABASE_URL: postgres://test:testpass@localhost:5432/testdb

      # E2E tests last
      - name: E2E Tests
        image: mcr.microsoft.com/playwright:latest
        cmd: npm ci && npm run test:e2e
        memory: "2g"

  # Load tests
  load:
    name: Load Tests
    sequence:
      - name: Run Load Tests
        image: grafana/k6:latest
        cmd: k6 run /workflow/tests/load/smoke.js
        env:
          K6_BASE_URL: http://localhost:3000
