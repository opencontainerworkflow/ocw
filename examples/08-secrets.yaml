# 08-secrets.yaml
# Working with environment variables and secrets
schemaVersion: "0.1.0"
name: Secrets and Environment Variables

env:
  # Regular env vars with defaults
  APP_NAME: my-application
  LOG_LEVEL: info
  
  # Secret env vars (marked with secret: true)
  API_KEY:
    secret: true
  
  DATABASE_URL:
    secret: true
    default: "postgresql://localhost/mydb"

sequence:
  - name: Show Configuration
    image: alpine:latest
    cmd: |
      echo "App: {{ env.APP_NAME }}"
      echo "Log Level: {{ env.LOG_LEVEL }}"
      echo "API Key: {{ secrets.API_KEY }}"
      echo "Database: {{ secrets.DATABASE_URL }}"

  - name: Use in Connection String
    image: alpine:latest
    env:
      CONNECTION: "{{ secrets.DATABASE_URL }}?key={{ secrets.API_KEY }}"
    cmd: |
      echo "Connection configured: $CONNECTION"
