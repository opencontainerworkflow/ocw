schemaVersion: "0.1.0"
name: Workflow Invocation Example
description: Demonstrate calling reusable workflows from local and remote sources

inputs:
  environment:
    type: choice
    description: Target environment
    options:
      - development
      - staging
      - production
    required: true

sequence:
  - name: Run shared security scan
    workflow:
      from: github.com/uncloud-org/shared-workflows/security-scan@v1.0.0
      inputs:
        severity: high
        failOnVulnerabilities: true
      inherit:
        secrets: all
        env: none

  - name: Build using local workflow
    workflow:
      from: ./workflows/build.yaml
      inputs:
        nodeVersion: "20"
        buildTarget: production
      inherit:
        secrets: all
        env: all

  - name: Deploy based on environment
    workflow:
      from: ./workflows/deploy.yaml
      inputs:
        environment: "{{inputs.environment}}"
        replicas: 3
        enableMonitoring: true
      secrets:
        DEPLOY_TOKEN: "{{secrets.DEPLOY_TOKEN}}"
        KUBECONFIG: "{{secrets.KUBECONFIG}}"
      env:
        DEPLOYMENT_REGION: us-east-1

  - name: Run E2E tests from remote
    workflow:
      from: github.com/uncloud-org/test-workflows/e2e@main
      inputs:
        browser: chrome
        headless: true
        baseUrl: https://{{inputs.environment}}.example.com
      inherit:
        secrets: none
        env: none
