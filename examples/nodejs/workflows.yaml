schemaVersion: "0.1.0"
name: Node.js Fullstack Application
description: |
  Fullstack Node.js application with Express.js API and React/Vite frontend.
  Use 'ocw dev' to start the local development environment.

jobs:
  # Build job - builds both frontend and backend images
  build:
    name: Build Images
    description: Build the API and frontend Docker images
    parallel:
      - id: build_api
        name: Build API Image
        build:
          image: ocw-nodejs-api:dev
          context: /workflow/backend

      - id: build_frontend
        name: Build Frontend Image
        build:
          image: ocw-nodejs-frontend:dev
          context: /workflow/frontend

  # Dev job - full local development environment with background containers
  dev:
    name: Local Development
    description: Start the full local development environment with PostgreSQL
    sequence:
      # First build the images
      - parallel:
          - id: build_api
            name: Build API Image
            build:
              image: ocw-nodejs-api:dev
              context: /workflow/backend

          - id: build_frontend
            name: Build Frontend Image
            build:
              image: ocw-nodejs-frontend:dev
              context: /workflow/frontend

      # Install dependencies
      - parallel:
          - name: Install backend dependencies
            image: node:20-alpine
            workdir: /workflow/backend
            cmd: npm install

          - name: Install frontend dependencies
            image: node:20-alpine
            workdir: /workflow/frontend
            cmd: npm install

      # Start PostgreSQL in background
      - name: Start PostgreSQL
        id: postgres
        image: postgres:16-alpine
        background: true
        healthCheck:
          cmd: pg_isready -U postgres
          interval: 2s
          retries: 15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_dev

      # Run database migrations
      - name: Run Migrations
        image: node:20-alpine
        workdir: /workflow/backend
        cmd: npm run db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_dev

      # Start API server in background
      - name: Start API Server
        id: api
        image: node:20-alpine
        workdir: /workflow/backend
        background: true
        healthCheck:
          cmd: wget -q --spider http://localhost:3001/health || exit 1
          interval: 2s
          retries: 10
          startPeriod: 3s
        env:
          PORT: "3001"
          NODE_ENV: development
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_dev

      # Start frontend - this one runs in foreground (blocks until Ctrl+C)
      - name: Start Frontend Dev Server
        image: node:20-alpine
        workdir: /workflow/frontend
        env:
          VITE_API_URL: "http://localhost:3001"
        cmd: npm run dev

  # Test job - run tests
  test:
    name: Run Tests
    description: Run all tests for the application
    sequence:
      - name: Install backend dependencies
        image: node:20-alpine
        workdir: /workflow/backend
        cmd: npm install

      - name: Run backend tests
        image: node:20-alpine
        workdir: /workflow/backend
        cmd: npm test || echo "No tests configured yet"
