schemaVersion: "0.1.0"
name: Environment-Based Deployment
description: Deploy to different environments based on input

inputs:
  environment:
    type: choice
    description: Target deployment environment
    options:
      - preview
      - staging
      - production
    required: true

  notifySlack:
    type: boolean
    description: Send Slack notification after deployment
    default: true
    required: false

switch: "{{inputs.environment}}"
case:
  preview:
    - name: Deploy to Preview
      image: kubectl:latest
      cmd: kubectl apply -f k8s/preview.yaml
      env:
        NAMESPACE: preview

    - name: Notify Preview
      image: curlimages/curl:latest
      cmd: |
        if [ "{{inputs.notifySlack}}" = "true" ]; then
          curl -X POST "{{secrets.SLACK_WEBHOOK}}" \
            -H "Content-Type: application/json" \
            -d '{"text": "Preview deployment completed"}'
        fi

  staging:
    - name: Run Pre-deployment Tests
      image: node:20-alpine
      cmd: npm run test:staging

    - name: Deploy to Staging
      image: kubectl:latest
      cmd: kubectl apply -f k8s/staging.yaml
      env:
        NAMESPACE: staging

  production:
    - name: Deploy to Production
      image: kubectl:latest
      cmd: kubectl apply -f k8s/production.yaml
      env:
        NAMESPACE: production

    - name: Run Smoke Tests
      image: node:20-alpine
      cmd: npm run test:smoke
      env:
        API_URL: https://api.production.example.com

    - name: Notify Production
      image: curlimages/curl:latest
      cmd: |
        curl -X POST "{{secrets.SLACK_WEBHOOK}}" \
          -H "Content-Type: application/json" \
          -d '{"text": "Production deployment completed"}'

default:
  - name: Deploy to Development
    image: kubectl:latest
    cmd: kubectl apply -f k8s/dev.yaml
    env:
      NAMESPACE: dev
