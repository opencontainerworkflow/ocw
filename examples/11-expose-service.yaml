# 11-expose-service.yaml
# Exposing container ports for local development
schemaVersion: "0.1.0"
name: Local Development Server

sequence:
  - name: Start Web Server
    id: web
    image: node:20-alpine
    background: true
    cmd: |
      echo '<h1>Hello from OCW! 👋</h1>' > index.html
      npx serve -p 8080
    expose: 8080

  - name: Show Info
    image: alpine:latest
    cmd: |
      echo "🌐 Server running at: http://localhost:8080"
      echo "Press Ctrl+C to stop"
      echo ""
      echo "Container ID: {{ steps.web.id }}"
