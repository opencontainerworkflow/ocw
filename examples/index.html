<!DOCTYPE html>
<html>
<head>
    <title>OCW Example</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            margin-top: 0;
        }
        a {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from OCW! 🎉</h1>
        <p>This page was served by a container built and run with OCW.</p>
        <p><strong>Open Container Workflow</strong> makes it easy to build and run container-based workflows.</p>
        <p>Learn more: <a href="https://github.com/opencontainerworkflow/ocw">github.com/opencontainerworkflow/ocw</a></p>
    </div>
</body>
</html>
